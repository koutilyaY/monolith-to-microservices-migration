name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: build & test (offline)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      # Default suite is fully offline (H2 + mocks + Spring Cloud Contract).
      # Testcontainers integration tests are gated behind -Pit and not run here.
      - name: Build and test
        run: mvn -B -DskipITs test
