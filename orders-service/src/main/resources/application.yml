server:
  port: 8082

spring:
  application:
    name: orders-service
  datasource:
    url: ${ORDERS_DB_URL:jdbc:postgresql://localhost:5433/orders}
    username: ${ORDERS_DB_USER:orders}
    password: ${ORDERS_DB_PASSWORD:orders}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: orders-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

migration:
  # Topic Debezium routes the outbox to (see infra/debezium/orders-outbox-connector.json).
  orders-events-topic: orders.events
  # Dual-write back to the monolith. On during the canary WRITE phase, off after full cutover.
  dual-write:
    enabled: ${DUAL_WRITE_ENABLED:false}
  monolith:
    base-url: ${MONOLITH_BASE_URL:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
