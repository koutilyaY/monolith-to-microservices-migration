description: |
  Represents creating an order. The service returns 201 with the created order in the canonical
  contract shape. The generated stub lets a consumer (the gateway) verify compatibility offline.
name: shouldCreateOrder
request:
  method: POST
  url: /api/orders
  headers:
    Content-Type: application/json
  body:
    customerId: 42
    totalAmount: 199.99
  matchers:
    body:
      - path: $.customerId
        type: by_regex
        value: "[0-9]+"
      - path: $.totalAmount
        type: by_regex
        value: "[0-9]+(\\.[0-9]+)?"
response:
  status: 201
  headers:
    Content-Type: application/json
  body:
    id: "11111111-1111-1111-1111-111111111111"
    customerId: 42
    status: "PLACED"
    totalAmount: 199.99
    version: 1
  matchers:
    body:
      - path: $.id
        type: by_regex
        value: "[0-9a-fA-F-]{36}"
      - path: $.status
        type: by_regex
        value: "PLACED"
