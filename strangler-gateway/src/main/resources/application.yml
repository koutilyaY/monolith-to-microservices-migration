server:
  port: 8080

spring:
  application:
    name: strangler-gateway
  cloud:
    gateway:
      httpclient:
        connect-timeout: 1000
        response-timeout: 5s

migration:
  routing:
    monolith-uri: ${MONOLITH_URI:http://localhost:8081}
    orders-service-uri: ${ORDERS_SERVICE_URI:http://localhost:8082}
  canary:
    # Start with 0% on the new service; advance via POST /admin/canary/weight/{n}.
    initial-weight: ${CANARY_INITIAL_WEIGHT:0}
  slo:
    check-interval-ms: 5000
    error-rate-threshold: 0.05   # 5% 5xx over an interval trips rollback
    latency-threshold-ms: 500    # mean latency guard
    min-requests: 20             # ignore intervals with too little traffic

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always
